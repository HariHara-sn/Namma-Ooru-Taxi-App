apply plugin: "com.android.application"
apply plugin: "com.facebook.react"
apply plugin: 'com.google.gms.google-services'
apply plugin: 'com.google.firebase.crashlytics'
apply plugin: "org.jetbrains.kotlin.android"

/**
 * This is the configuration block to customize your React Native Android app.
 * By default you don't need to apply any configuration, just uncomment the lines you need.
 */
react {
    autolinkLibrariesWithApp()
}

project.ext.react = [
    enableHermes: false,  // clean and rebuild if changing
    hermesFlagsRelease: ["-O", "-output-source-map"],
]

/**
 * Set this to true to Run Proguard on Release builds to minify the Java bytecode.
 */
def enableProguardInReleaseBuilds = false

/**
 * The preferred build flavor of JavaScriptCore (JSC)
 *
 * For example, to use the international variant, you can use:
 * `def jscFlavor = 'org.webkit:android-jsc-intl:+'`
 *
 * The international variant includes ICU i18n library and necessary data
 * allowing to use e.g. `Date.toLocaleString` and `String.localeCompare` that
 * give correct results when using with locales other than en-US. Note that
 * this variant is about 6MiB larger per architecture than default.
 */
def jscFlavor = 'io.github.react-native-community:jsc-android:2026004.+'

def nativeArchitectures = project.getProperties().get("reactNativeDebugArchitectures")

android {
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace "com.virtualmaze.prcustomer"
    packaging {
    jniLibs {
      useLegacyPackaging = false
      // Only if you truly hit duplicate-file errors; otherwise omit.
      pickFirsts += [
        '**/libreactnative.so',
        '**/libturbomodulejsijni.so',
        '**/libhermes.so',
        '**/libhermes-executor-debug.so',
        '**/libreact_featureflagsjni.so',
        '**/libc++_shared.so'
      ]
    }
  }
    defaultConfig {
        applicationId "com.virtualmaze.prcustomer"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 44
        versionName "2.6.1.0"
        missingDimensionStrategy 'react-native-camera', 'general' // <-- insert this line
        missingDimensionStrategy 'store', 'play'
        // buildConfigField "boolean", "IS_NEW_ARCHITECTURE_ENABLED", isNewArchitectureEnabled().toString()
        // testBuildType System.getProperty('testBuildType', 'debug')
        // testInstrumentationRunner 'androidx.test.runner.AndroidJUnitRunner'
    }

    compileOptions {
    sourceCompatibility = JavaVersion.VERSION_21
    targetCompatibility = JavaVersion.VERSION_21
    coreLibraryDesugaringEnabled = true
  }

  // Kotlin -> Java 21 bytecode
  kotlinOptions {
  jvmTarget = "17"
}

  // Use JDK 21 toolchain for Java sources
  java {
    toolchain {
      languageVersion = JavaLanguageVersion.of(21)
    }
  }

kotlin {
  jvmToolchain(21) // toolchain JDK is 21, but jvmTarget (bytecode) is 17
}

    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }

        release {
            // storeFile file('prcustomer-release.keystore')
            // storePassword 'VM@123'
            // keyAlias 'prcustomer'
            // keyPassword 'VM@123'
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'

        }
    }
    buildTypes {
        debug {
            signingConfig signingConfigs.debug
            if (nativeArchitectures) {
                ndk {
                    abiFilters nativeArchitectures.split(',')
                }
            }
        }
        release {
            signingConfig signingConfigs.release
            minifyEnabled enableProguardInReleaseBuilds
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
        }
    }

    // Exclude New Architecture sources when disabled to avoid compile-time references
    if (!project.hasProperty('newArchEnabled') || !project.getProperties().get('newArchEnabled').toBoolean()) {
        sourceSets {
            main {
                java {
                    exclude 'src/main/java/com/virtualmaze/prcustomer/newarchitecture/**'
                }
            }
        }
    }
}
dependencies {
    implementation fileTree(dir: "libs", include: ['*.jar', '*.aar'])

    //noinspection GradleDynamicVersion
    implementation 'com.facebook.react:react-native'  // From node_modules

    implementation 'androidx.swiperefreshlayout:swiperefreshlayout:1.1.0'

    implementation 'com.google.firebase:firebase-messaging:23.1.2' 

    implementation name: "nenative", ext: 'aar'
    implementation name: "ne_location_management", ext: 'aar'
    implementation name: "bundle_downloader", ext: 'aar'
    implementation name: "services_core", ext: 'aar'
    implementation name: "geoJson", ext: 'aar'
    implementation name: "navigation", ext: 'aar'
    implementation name: "navigation_ui", ext: 'aar'
    implementation name: "speech", ext: 'aar'
    implementation name: "telemetry", ext: 'aar'
    implementation name: "turf", ext: 'aar'
    implementation name: "models", ext: 'aar'
    // The version of react-native is set by the React Native Gradle Plugin
    implementation 'com.squareup.retrofit2:retrofit:2.5.0'
    implementation 'com.squareup.retrofit2:converter-gson:2.5.0'
    implementation "com.squareup.okhttp3:okhttp-urlconnection:3.8.1"
    implementation 'com.google.guava:guava:28.2-jre'
    implementation "com.squareup.picasso:picasso:2.71828"
    implementation "com.jakewharton.timber:timber:4.7.1"
    implementation "org.jetbrains.kotlin:kotlin-stdlib:2.0.21"
    implementation 'androidx.lifecycle:lifecycle-extensions:2.0.0'
    implementation 'androidx.multidex:multidex:2.0.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
    implementation 'androidx.swiperefreshlayout:swiperefreshlayout:1.1.0'

    implementation 'androidx.recyclerview:recyclerview:1.3.2'
    implementation 'com.google.android.material:material:1.12.0'
    implementation 'androidx.lifecycle:lifecycle-livedata-ktx:2.8.3'
    implementation 'androidx.lifecycle:lifecycle-viewmodel-ktx:2.8.3'
    implementation 'androidx.navigation:navigation-fragment:2.7.7'
    implementation 'androidx.navigation:navigation-ui:2.7.7'

    androidTestImplementation 'androidx.test.espresso:espresso-core:3.4.0'
    androidTestImplementation 'androidx.test:runner:1.4.0'
    androidTestImplementation 'androidx.test:rules:1.4.0'
    
    
    implementation 'com.airbnb.android:lottie:6.4.0'
    implementation 'androidx.work:work-runtime-ktx:2.9.0'
    implementation platform('com.google.firebase:firebase-bom:32.2.0')
    implementation 'com.google.firebase:firebase-analytics'
    implementation 'com.google.firebase:firebase-crashlytics'
    implementation 'com.google.firebase:firebase-messaging'

    implementation 'com.google.android.gms:play-services-location:21.3.0'
    implementation 'com.google.android.gms:play-services-auth:21.3.0'
    implementation 'com.squareup.okhttp3:okhttp:4.12.0'
    implementation 'com.google.code.gson:gson:2.11.0'

    androidTestImplementation('com.wix:detox:+')
    implementation 'androidx.appcompat:appcompat:1.7.0'
    // Align Fragment to a version that fixes NPE in noteStateNotSaved during permission callbacks
    implementation 'androidx.fragment:fragment:1.7.1'

    //noinspection GradleDynamicVersion
    implementation 'com.facebook.react:react-native'  // From node_modules
    // implementation("com.facebook.react:flipper-integration")

      implementation('io.socket:socket.io-client:2.0.1') {
    exclude group: 'org.json', module: 'json'
  }

  implementation 'androidx.palette:palette:1.0.0'

    if (hermesEnabled.toBoolean()) {
          implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }

    // Required when compileOptions.coreLibraryDesugaringEnabled = true
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.0.4'
}

// Run this once to be able to run the application with BUCK
// puts all compile dependencies into folder libs for BUCK to use
task copyDownloadableDepsToLibs(type: Copy) {
    from configurations.implementation
    into 'libs'
}

// apply from: file("../../node_modules/@react-native-community/cli-platform-android/native_modules.gradle");
apply from: file("../../node_modules/react-native-vector-icons/fonts.gradle");
apply from: project(':react-native-config').projectDir.getPath() + "/dotenv.gradle"
// dotenv.gradle loaded at top


